<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
<title>Hypomnema — 覚書</title>
<meta name="description" content="自分のための覚書。スマホで書くやさしいメモ。記号は出てこない。すべて端末の中だけに。" />
<meta name="theme-color" content="#f7f4ec" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Hypomnema" />
<link rel="manifest" href="./manifest.json" />
<link rel="apple-touch-icon" href="./icons/icon-192.png" />
<style>
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:      #f7f4ec;
  --s1:      #efeae0;
  --s2:      #e5dfd2;
  --border:  #ddd6c7;
  --text:    #2b2a26;
  --text2:   #6f6a5d;
  --text3:   #a8a294;
  --accent:  #45688f;
  --accent2: rgba(69,104,143,0.13);
  --acc-bdr: rgba(69,104,143,0.34);
}
html { background: var(--bg); color: var(--text); font-family: -apple-system, "Helvetica Neue", "Hiragino Sans", sans-serif; -webkit-font-smoothing: antialiased; -webkit-tap-highlight-color: transparent; }
body { min-height: 100dvh; display: flex; flex-direction: column; }
button { font-family: inherit; }
button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

/* ── Topbar ── */
.topbar { background: var(--bg); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; padding: calc(env(safe-area-inset-top,0px) + 10px) 12px 10px; flex-shrink: 0; position: sticky; top: 0; z-index: 20; }
.topbar-title { font-size: 17px; font-weight: 800; color: var(--accent); letter-spacing: 0.01em; }
.topbar-doc   { font-size: 15px; font-weight: 700; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text); }
.btn-icon { background: none; border: none; color: var(--text2); cursor: pointer; padding: 8px; border-radius: 10px; display: flex; align-items: center; transition: background 0.15s, color 0.15s; }
.btn-icon:hover, .btn-icon:focus-visible { background: var(--s2); color: var(--text); }
.btn-icon:active { opacity: 0.6; }
.btn-icon svg { width: 22px; height: 22px; }

/* ── Note list ── */
.list-wrap { flex: 1; overflow-y: auto; padding: 6px 12px calc(env(safe-area-inset-bottom,0px) + 90px); }
.list-empty { text-align: center; padding: 72px 24px; color: var(--text3); font-size: 15px; line-height: 2; }
.list-empty .big { display:block; font-size: 40px; margin-bottom: 8px; }
.note-item { display: flex; align-items: flex-start; gap: 13px; padding: 14px 12px; border-radius: 14px; cursor: pointer; transition: background 0.12s; border: 1px solid transparent; margin-bottom: 4px; }
.note-item:hover, .note-item:focus-visible { background: var(--s1); border-color: var(--border); }
.note-item:active { background: var(--s2); }
.note-mark { color: var(--accent); flex-shrink: 0; margin-top: 3px; opacity: 0.85; }
.note-body { flex: 1; min-width: 0; }
.note-title { font-size: 16px; font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.note-preview { font-size: 13px; color: var(--text2); margin-top: 3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.note-date { font-size: 11px; color: var(--text3); margin-top: 5px; }

.fab { position: fixed; bottom: calc(env(safe-area-inset-bottom,0px) + 20px); right: 18px; height: 56px; padding: 0 22px 0 18px; background: var(--accent); border: none; border-radius: 28px; display: flex; align-items: center; gap: 8px; cursor: pointer; box-shadow: 0 6px 18px rgba(69,104,143,0.34); transition: transform 0.12s; z-index: 30; color: #fff; font-size: 16px; font-weight: 800; }
.fab:active { transform: scale(0.95); }
.fab svg { width: 22px; height: 22px; }

/* search */
.search-wrap { padding: 12px 12px 4px; position: sticky; top: 0; }
.search-input { width: 100%; background: var(--s1); border: 1px solid var(--border); border-radius: 12px; color: var(--text); font-size: 15px; padding: 11px 14px; outline: none; font-family: inherit; }
.search-input:focus { border-color: var(--acc-bdr); }
.search-input::placeholder { color: var(--text3); }

/* ── Editor ── */
.ed-screen { display: flex; flex-direction: column; height: 100dvh; }
.rt-scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.rt-editor {
  max-width: 720px; margin: 0 auto;
  padding: 18px 18px calc(env(safe-area-inset-bottom,0px) + 40px);
  min-height: 100%;
  font-size: 17px; line-height: 1.85;
  outline: none; caret-color: var(--accent);
  word-break: break-word;
}
.rt-editor:empty::before {
  content: attr(data-placeholder);
  color: var(--text3);
  pointer-events: none;
}
.rt-editor h1 { font-size: 1.65em; font-weight: 900; margin: 0.7em 0 0.35em; letter-spacing: -0.01em; line-height: 1.3; }
.rt-editor h2 { font-size: 1.32em; font-weight: 800; margin: 0.7em 0 0.3em; line-height: 1.35; }
.rt-editor h3 { font-size: 1.12em; font-weight: 700; margin: 0.6em 0 0.25em; }
.rt-editor h1:first-child, .rt-editor h2:first-child, .rt-editor h3:first-child, .rt-editor > div:first-child, .rt-editor > p:first-child { margin-top: 0; }
.rt-editor p, .rt-editor div { margin: 0.45em 0; }
.rt-editor ul, .rt-editor ol { margin: 0.5em 0; padding-left: 1.5em; }
.rt-editor li { margin: 0.2em 0; }
.rt-editor blockquote { border-left: 3px solid var(--accent); padding-left: 14px; color: var(--text2); margin: 0.6em 0; font-style: italic; }
.rt-editor a { color: var(--accent); text-decoration: underline; text-underline-offset: 2px; }
.rt-editor strong, .rt-editor b { font-weight: 800; color: #15140f; }
.rt-editor em, .rt-editor i { font-style: italic; }
.rt-editor s, .rt-editor strike, .rt-editor del { color: var(--text3); }
.rt-editor code { font-family: monospace; background: var(--s2); padding: 1px 5px; border-radius: 4px; font-size: 0.9em; }
.rt-editor hr { border: none; border-top: 1px solid var(--border); margin: 1em 0; }
/* checklist */
.rt-editor ul.checklist { list-style: none; padding-left: 4px; }
.rt-editor ul.checklist > li { position: relative; padding-left: 34px; min-height: 26px; }
.rt-editor ul.checklist > li::before {
  content: ''; position: absolute; left: 0; top: 0.18em;
  width: 22px; height: 22px; border: 2px solid var(--text3); border-radius: 6px;
  cursor: pointer; transition: border-color 0.15s, background 0.15s;
}
.rt-editor ul.checklist > li.done::before {
  border-color: var(--accent); background: var(--accent);
}
.rt-editor ul.checklist > li.done::after {
  content: ''; position: absolute; left: 7px; top: 0.32em;
  width: 7px; height: 12px; border: solid #fff; border-width: 0 2.5px 2.5px 0;
  transform: rotate(42deg); pointer-events: none;
}
.rt-editor ul.checklist > li.done { color: var(--text2); text-decoration: line-through; text-decoration-color: var(--text3); }

/* ── Toolbar ── */
.toolbar { background: var(--s1); border-top: 1px solid var(--border); display: flex; gap: 2px; overflow-x: auto; scrollbar-width: none; padding: 6px 8px calc(env(safe-area-inset-bottom,0px) + 6px); flex-shrink: 0; }
.toolbar::-webkit-scrollbar { display: none; }
.tb { background: none; border: none; color: var(--text); cursor: pointer; border-radius: 10px; padding: 6px 4px; min-width: 50px; display: flex; flex-direction: column; align-items: center; gap: 3px; transition: background 0.12s; flex-shrink: 0; }
.tb:active { background: var(--s2); }
.tb.active { background: var(--accent2); color: var(--accent); }
.tb .ico { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 800; }
.tb .ico svg { width: 22px; height: 22px; }
.tb .lbl { font-size: 10.5px; color: var(--text2); font-weight: 600; white-space: nowrap; }
.tb.active .lbl { color: var(--accent); }
.tb-sep { width: 1px; background: var(--border); margin: 8px 5px; flex-shrink: 0; align-self: stretch; }

/* modal / menu */
.menu { background: var(--s1); border-radius: 14px; padding: 6px; min-width: 200px; border: 1px solid var(--border); }
.menu-item { display: flex; align-items: center; gap: 11px; padding: 12px 12px; border-radius: 10px; cursor: pointer; font-size: 15px; font-weight: 600; color: var(--text); border: none; background: none; width: 100%; font-family: inherit; text-align: left; }
.menu-item:active { background: var(--s2); }
.menu-item.danger { color: #cc6a6a; }
.menu-item svg { width: 18px; height: 18px; flex-shrink: 0; color: var(--text2); }
.menu-item.danger svg { color: #cc6a6a; }
</style>
</head>
<body>
<div id="app"></div>

<script>
'use strict';

/* ════ Storage ════ */
const STORAGE = 'hypomnema_v1';
let state = { notes: [] };

function loadState() {
  try { const r = localStorage.getItem(STORAGE); if (r) state = { ...state, ...JSON.parse(r) }; } catch {}
}
function saveState() {
  try { localStorage.setItem(STORAGE, JSON.stringify(state)); } catch {}
}

/* ════ Note helpers ════ */
function uid() { return 'n' + Date.now().toString(36) + Math.random().toString(36).slice(2,5); }

function blocksText(html) {
  const d = document.createElement('div');
  d.innerHTML = html || '';
  if (!d.children.length) return (d.textContent || '').trim();
  return [...d.children].map(c => (c.textContent || '').trim()).filter(Boolean).join('\n');
}
function noteTitle(html) {
  const t = blocksText(html).split('\n')[0];
  return t ? t.slice(0, 80) : '（無題）';
}
function notePreview(html) {
  const lines = blocksText(html).split('\n');
  return (lines.slice(1).join(' ') || '').slice(0, 90);
}
function fmtDate(ts) {
  if (!ts) return '';
  const d = new Date(ts), now = new Date(), diff = (now - d) / 1000;
  if (diff < 60) return 'たった今';
  if (diff < 3600) return `${Math.floor(diff/60)}分前`;
  if (diff < 86400) return `${Math.floor(diff/3600)}時間前`;
  if (diff < 86400*2) return '昨日';
  if (diff < 86400*7) return `${Math.floor(diff/86400)}日前`;
  return `${d.getFullYear() === now.getFullYear() ? '' : d.getFullYear()+'/'}${d.getMonth()+1}/${d.getDate()}`;
}

function newNote() {
  const note = { id: uid(), content: '', createdAt: Date.now(), updatedAt: Date.now() };
  state.notes.unshift(note);
  saveState();
  return note.id;
}
function saveNote(id, html) {
  const n = state.notes.find(n => n.id === id);
  if (n && n.content !== html) { n.content = html; n.updatedAt = Date.now(); saveState(); }
}
function deleteNote(id) { state.notes = state.notes.filter(n => n.id !== id); saveState(); }
function getNote(id) { return state.notes.find(n => n.id === id); }

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ════ HTML → Markdown (for copy / share) ════ */
function htmlToMd(html) {
  const d = document.createElement('div');
  d.innerHTML = html || '';

  function inline(node) {
    let s = '';
    node.childNodes.forEach(n => {
      if (n.nodeType === 3) { s += n.nodeValue; return; }
      if (n.nodeType !== 1) return;
      const t = n.tagName;
      if (t === 'BR') s += '\n';
      else if (t === 'STRONG' || t === 'B') s += '**' + inline(n) + '**';
      else if (t === 'EM' || t === 'I') s += '*' + inline(n) + '*';
      else if (t === 'S' || t === 'STRIKE' || t === 'DEL') s += '~~' + inline(n) + '~~';
      else if (t === 'CODE') s += '`' + inline(n) + '`';
      else if (t === 'A') s += '[' + inline(n) + '](' + (n.getAttribute('href') || '') + ')';
      else s += inline(n);
    });
    return s;
  }

  const out = [];
  function walk(el) {
    const t = el.tagName;
    if (t === 'H1') out.push('# ' + inline(el).trim());
    else if (t === 'H2') out.push('## ' + inline(el).trim());
    else if (t === 'H3') out.push('### ' + inline(el).trim());
    else if (t === 'H4' || t === 'H5' || t === 'H6') out.push('#### ' + inline(el).trim());
    else if (t === 'BLOCKQUOTE') out.push(inline(el).trim().split('\n').map(l => '> ' + l).join('\n'));
    else if (t === 'UL') {
      const chk = el.classList.contains('checklist');
      el.querySelectorAll(':scope > li').forEach(li => {
        const mark = chk ? (li.classList.contains('done') ? '- [x] ' : '- [ ] ') : '- ';
        out.push(mark + inline(li).trim());
      });
    }
    else if (t === 'OL') {
      let i = 1;
      el.querySelectorAll(':scope > li').forEach(li => out.push((i++) + '. ' + inline(li).trim()));
    }
    else if (t === 'HR') out.push('---');
    else if (t === 'PRE') out.push('```\n' + (el.textContent || '') + '\n```');
    else { const s = inline(el).trim(); if (s) out.push(s); }
  }

  if (!d.children.length) return (d.textContent || '').trim();
  [...d.children].forEach(walk);
  return out.join('\n\n').replace(/\n{3,}/g, '\n\n').trim();
}

/* ════ View state ════ */
let view = { screen: 'list', noteId: null, query: '' };
let _saveTimer = null;

function go(screen, opts) { view = { ...view, screen, ...(opts||{}) }; render(); }

function render() {
  const app = document.getElementById('app');
  if (view.screen === 'editor') { app.innerHTML = screenEditor(); bindEditor(); }
  else { app.innerHTML = screenList(); }
}

/* ════ List screen ════ */
function screenList() {
  const q = view.query.toLowerCase();
  const notes = state.notes
    .filter(n => !q || blocksText(n.content).toLowerCase().includes(q))
    .sort((a, b) => b.updatedAt - a.updatedAt);

  const items = notes.map(n => `
    <div class="note-item" onclick="openNote('${n.id}')" tabindex="0" role="button"
      onkeydown="if(event.key==='Enter')openNote('${n.id}')">
      <div class="note-mark">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="5" y1="7" x2="19" y2="7"/><line x1="5" y1="12" x2="15" y2="12"/><line x1="5" y1="17" x2="17" y2="17"/>
        </svg>
      </div>
      <div class="note-body">
        <div class="note-title">${esc(noteTitle(n.content))}</div>
        ${notePreview(n.content) ? `<div class="note-preview">${esc(notePreview(n.content))}</div>` : ''}
        <div class="note-date">${fmtDate(n.updatedAt)}</div>
      </div>
    </div>`).join('');

  return `
    <div style="display:flex;flex-direction:column;height:100dvh">
      <div class="topbar">
        <span class="topbar-title">Hypomnema</span>
        <span style="flex:1"></span>
        <span style="font-size:12px;color:var(--text3)">${state.notes.length} 件</span>
      </div>
      <div class="list-wrap">
        <div class="search-wrap" style="position:static;padding:6px 0 8px">
          <input class="search-input" type="search" placeholder="さがす…" value="${esc(view.query)}"
            oninput="view.query=this.value;refreshList()" aria-label="さがす" />
        </div>
        <div id="note-list">
          ${notes.length === 0
            ? `<div class="list-empty"><span class="big">✎</span>${view.query ? 'みつかりませんでした' : 'まだ何もありません。<br>右下の「書く」からはじめましょう。'}</div>`
            : items}
        </div>
      </div>
      <button class="fab" onclick="createAndOpen()" aria-label="新しく書く">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>
        書く
      </button>
    </div>`;
}

function refreshList() {
  // Re-render just the list without losing the search input focus
  const q = view.query.toLowerCase();
  const notes = state.notes
    .filter(n => !q || blocksText(n.content).toLowerCase().includes(q))
    .sort((a, b) => b.updatedAt - a.updatedAt);
  const el = document.getElementById('note-list');
  if (!el) return;
  el.innerHTML = notes.length === 0
    ? `<div class="list-empty"><span class="big">✎</span>${view.query ? 'みつかりませんでした' : 'まだ何もありません。<br>右下の「書く」からはじめましょう。'}</div>`
    : notes.map(n => `
      <div class="note-item" onclick="openNote('${n.id}')" tabindex="0" role="button" onkeydown="if(event.key==='Enter')openNote('${n.id}')">
        <div class="note-mark"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="5" y1="7" x2="19" y2="7"/><line x1="5" y1="12" x2="15" y2="12"/><line x1="5" y1="17" x2="17" y2="17"/></svg></div>
        <div class="note-body">
          <div class="note-title">${esc(noteTitle(n.content))}</div>
          ${notePreview(n.content) ? `<div class="note-preview">${esc(notePreview(n.content))}</div>` : ''}
          <div class="note-date">${fmtDate(n.updatedAt)}</div>
        </div>
      </div>`).join('');
}

function createAndOpen() { const id = newNote(); go('editor', { noteId: id }); }
function openNote(id) { go('editor', { noteId: id }); }

/* ════ Editor screen (WYSIWYG) ════ */
function screenEditor() {
  const note = getNote(view.noteId);
  if (!note) { go('list'); return ''; }

  const TB = (id, label, icon, onclick) =>
    `<button class="tb" id="${id||''}" onmousedown="event.preventDefault()" onclick="${onclick}" title="${label}">
       <span class="ico">${icon}</span><span class="lbl">${label}</span>
     </button>`;

  const ic = {
    bold: '<b>B</b>',
    italic: '<i>I</i>',
    strike: '<s>S</s>',
    h1: 'A',
    h2: 'A',
    bullet: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="9" y1="6" x2="20" y2="6"/><line x1="9" y1="12" x2="20" y2="12"/><line x1="9" y1="18" x2="20" y2="18"/><circle cx="4.5" cy="6" r="1.4" fill="currentColor"/><circle cx="4.5" cy="12" r="1.4" fill="currentColor"/><circle cx="4.5" cy="18" r="1.4" fill="currentColor"/></svg>',
    number: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="10" y1="6" x2="20" y2="6"/><line x1="10" y1="12" x2="20" y2="12"/><line x1="10" y1="18" x2="20" y2="18"/><text x="2" y="9" font-size="8" fill="currentColor" stroke="none">1</text><text x="2" y="15" font-size="8" fill="currentColor" stroke="none">2</text><text x="2" y="21" font-size="8" fill="currentColor" stroke="none">3</text></svg>',
    check: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="4"/><path d="M8 12l3 3 5-6"/></svg>',
    quote: '<svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M7 7H4a1 1 0 0 0-1 1v5a1 1 0 0 0 1 1h2v3a3 3 0 0 1-2 .9V20a5 5 0 0 0 4-5V8a1 1 0 0 0-1-1zm12 0h-3a1 1 0 0 0-1 1v5a1 1 0 0 0 1 1h2v3a3 3 0 0 1-2 .9V20a5 5 0 0 0 4-5V8a1 1 0 0 0-1-1z"/></svg>',
    link: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7 0l3-3a5 5 0 0 0-7-7l-1 1"/><path d="M14 11a5 5 0 0 0-7 0l-3 3a5 5 0 0 0 7 7l1-1"/></svg>',
  };

  const toolbar = `
    <div class="toolbar" id="toolbar" role="toolbar">
      ${TB('tb-bold','太字', ic.bold, "exec('bold')")}
      ${TB('tb-italic','斜体', ic.italic, "exec('italic')")}
      <div class="tb-sep"></div>
      ${TB('','大きく', `<span style="font-size:22px">${ic.h1}</span>`, "toggleHeading('H1')")}
      ${TB('','見出し', `<span style="font-size:15px">${ic.h2}</span>`, "toggleHeading('H2')")}
      <div class="tb-sep"></div>
      ${TB('','チェック', ic.check, "makeChecklist()")}
      ${TB('','リスト', ic.bullet, "exec('insertUnorderedList')")}
      ${TB('','番号', ic.number, "exec('insertOrderedList')")}
      <div class="tb-sep"></div>
      ${TB('','引用', ic.quote, "toggleQuote()")}
      ${TB('tb-strike','取り消し', ic.strike, "exec('strikeThrough')")}
      ${TB('','リンク', ic.link, "insertLink()")}
    </div>`;

  return `
    <div class="ed-screen">
      <div class="topbar">
        <button class="btn-icon" onclick="backToList()" aria-label="もどる">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <span class="topbar-doc" id="ed-title">${esc(noteTitle(note.content))}</span>
        <button class="btn-icon" onclick="openMenu(this)" aria-label="メニュー">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="12" cy="5" r="1.6"/><circle cx="12" cy="12" r="1.6"/><circle cx="12" cy="19" r="1.6"/></svg>
        </button>
      </div>
      <div class="rt-scroll">
        <div class="rt-editor" id="editor" contenteditable="true"
          data-placeholder="ここに書く…" role="textbox" aria-multiline="true" aria-label="本文"></div>
      </div>
      ${toolbar}
    </div>`;
}

/* ════ Editor binding ════ */
function bindEditor() {
  const ed = document.getElementById('editor');
  const note = getNote(view.noteId);
  if (!ed || !note) return;

  ed.innerHTML = note.content || '';
  try { document.execCommand('styleWithCSS', false, false); } catch {}
  try { document.execCommand('defaultParagraphSeparator', false, 'p'); } catch {}

  // Paste as plain text (no foreign formatting — keeps it clean for everyone)
  ed.addEventListener('paste', e => {
    e.preventDefault();
    const text = (e.clipboardData || window.clipboardData).getData('text/plain');
    document.execCommand('insertText', false, text);
  });

  // Tap the checkbox area to toggle done
  ed.addEventListener('click', e => {
    const li = e.target.closest && e.target.closest('li');
    if (li && li.parentElement && li.parentElement.classList.contains('checklist')) {
      const rect = li.getBoundingClientRect();
      if (e.clientX - rect.left < 36) {
        li.classList.toggle('done');
        onEditorInput();
        e.preventDefault();
      }
    }
  });

  // Enter at end of a heading → drop back to normal body
  ed.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      const b = currentBlock();
      if (b && /^H[1-3]$/.test(b.tagName)) {
        e.preventDefault();
        document.execCommand('insertParagraph');
        setTimeout(() => { const nb = currentBlock(); if (nb && /^H[1-3]$/.test(nb.tagName)) document.execCommand('formatBlock', false, 'P'); }, 0);
      }
    }
  });

  ed.addEventListener('input', onEditorInput);
  document.addEventListener('selectionchange', updateToolbarState);

  // Focus a fresh empty note so the user can start typing immediately
  if (!note.content) setTimeout(() => ed.focus(), 90);
}

function onEditorInput() {
  const ed = document.getElementById('editor');
  if (!ed) return;
  if (ed.innerHTML === '<br>' || ed.innerHTML === '<div><br></div>') ed.innerHTML = '';
  const t = document.getElementById('ed-title');
  if (t) t.textContent = noteTitle(ed.innerHTML);
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(() => saveNote(view.noteId, ed.innerHTML), 500);
}

function currentBlock() {
  const sel = window.getSelection();
  if (!sel.rangeCount) return null;
  let n = sel.anchorNode;
  const ed = document.getElementById('editor');
  while (n && n !== ed) {
    if (n.nodeType === 1 && /^(H1|H2|H3|H4|P|DIV|LI|BLOCKQUOTE)$/.test(n.tagName)) return n;
    n = n.parentNode;
  }
  return null;
}
function closestTag(tag) {
  const sel = window.getSelection();
  if (!sel.rangeCount) return null;
  let n = sel.anchorNode;
  const ed = document.getElementById('editor');
  while (n && n !== ed) { if (n.nodeType === 1 && n.tagName === tag) return n; n = n.parentNode; }
  return null;
}

/* ── Toolbar actions ── */
function exec(cmd, val) {
  const ed = document.getElementById('editor'); if (ed) ed.focus();
  try { document.execCommand(cmd, false, val || null); } catch {}
  onEditorInput();
  updateToolbarState();
}
function toggleHeading(level) {
  const ed = document.getElementById('editor'); if (ed) ed.focus();
  let cur = '';
  try { cur = (document.queryCommandValue('formatBlock') || '').toLowerCase(); } catch {}
  document.execCommand('formatBlock', false, cur === level.toLowerCase() ? 'P' : level);
  onEditorInput();
}
function toggleQuote() {
  const ed = document.getElementById('editor'); if (ed) ed.focus();
  document.execCommand('formatBlock', false, closestTag('BLOCKQUOTE') ? 'P' : 'BLOCKQUOTE');
  onEditorInput();
}
function makeChecklist() {
  const ed = document.getElementById('editor'); if (ed) ed.focus();
  let ul = closestTag('UL');
  if (ul && ul.classList.contains('checklist')) {
    // already a checklist → turn it back into a plain list
    ul.classList.remove('checklist');
    ul.querySelectorAll(':scope > li').forEach(li => li.classList.remove('done'));
  } else if (ul) {
    ul.classList.add('checklist');
  } else {
    document.execCommand('insertUnorderedList');
    ul = closestTag('UL');
    if (ul) ul.classList.add('checklist');
  }
  onEditorInput();
}
function insertLink() {
  const ed = document.getElementById('editor');
  const sel = window.getSelection();
  const range = sel.rangeCount ? sel.getRangeAt(0).cloneRange() : null;
  const url = prompt('リンク先のURLを貼り付け', 'https://');
  if (!url || url === 'https://') return;
  ed.focus();
  if (range) { sel.removeAllRanges(); sel.addRange(range); }
  if (sel.isCollapsed) document.execCommand('insertHTML', false, `<a href="${esc(url)}">${esc(url)}</a>`);
  else document.execCommand('createLink', false, url);
  onEditorInput();
}

function updateToolbarState() {
  if (view.screen !== 'editor') return;
  const map = { 'tb-bold': 'bold', 'tb-italic': 'italic', 'tb-strike': 'strikeThrough' };
  for (const [id, cmd] of Object.entries(map)) {
    const el = document.getElementById(id);
    if (!el) continue;
    let on = false;
    try { on = document.queryCommandState(cmd); } catch {}
    el.classList.toggle('active', on);
  }
}

function backToList() {
  const ed = document.getElementById('editor');
  if (ed) saveNote(view.noteId, ed.innerHTML);
  document.removeEventListener('selectionchange', updateToolbarState);
  // remove empty note automatically
  const n = getNote(view.noteId);
  if (n && !blocksText(n.content)) deleteNote(view.noteId);
  go('list');
}

/* ════ Menu (share / copy / delete) ════ */
function openMenu(btn) {
  if (document.getElementById('the-menu')) { closeMenu(); return; }
  const ed = document.getElementById('editor');
  if (ed) saveNote(view.noteId, ed.innerHTML);
  const rect = btn.getBoundingClientRect();
  const m = document.createElement('div');
  m.id = 'the-menu';
  Object.assign(m.style, { position: 'fixed', top: (rect.bottom + 6) + 'px', right: '12px', zIndex: 200, boxShadow: '0 10px 36px rgba(0,0,0,0.6)' });
  m.innerHTML = `<div class="menu">
    <button class="menu-item" onclick="doShare()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>共有する</button>
    <button class="menu-item" onclick="copyText()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>文章をコピー</button>
    <button class="menu-item" onclick="copyMd()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>マークダウンでコピー</button>
    <button class="menu-item danger" onclick="confirmDelete()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>削除する</button>
  </div>`;
  document.body.appendChild(m);
  setTimeout(() => document.addEventListener('click', closeMenu, { once: true }), 10);
}
function closeMenu() { document.getElementById('the-menu')?.remove(); }

function curHtml() { const ed = document.getElementById('editor'); return ed ? ed.innerHTML : (getNote(view.noteId)?.content || ''); }
function curText() { return blocksText(curHtml()); }

function copyText() { closeMenu(); navigator.clipboard?.writeText(curText()).then(() => toast('コピーしました')); }
function copyMd()   { closeMenu(); navigator.clipboard?.writeText(htmlToMd(curHtml())).then(() => toast('マークダウンでコピーしました')); }
function doShare() {
  closeMenu();
  const text = curText();
  if (navigator.share) navigator.share({ title: noteTitle(curHtml()), text }).catch(() => {});
  else copyText();
}
function confirmDelete() {
  closeMenu();
  if (confirm(`「${noteTitle(curHtml())}」を削除しますか？`)) { deleteNote(view.noteId); go('list'); }
}

function toast(msg) {
  const t = document.createElement('div');
  t.textContent = msg;
  Object.assign(t.style, { position:'fixed', bottom:'96px', left:'50%', transform:'translateX(-50%)', background:'var(--s2)', border:'1px solid var(--border)', color:'var(--text)', borderRadius:'22px', padding:'9px 22px', fontSize:'14px', zIndex:'300', transition:'opacity 0.3s', pointerEvents:'none' });
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 1700);
}

/* ════ PWA ════ */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(() => {}));
}

/* ════ Boot ════ */
loadState();
render();
</script>
</body>
